<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Statement Generator</title>
    <!-- html2canvas + jsPDF for reliable PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <style>
        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            padding: 30px 34px 34px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 2px solid #eef2f7;
            margin-bottom: 24px;
        }
        .app-header .brand {
            font-size: 26px;
            font-weight: 800;
            color: #1a5276;
        }
        .app-header .brand span {
            color: #f39c12;
        }
        .app-header .badge {
            font-size: 13px;
            background: #eaf2f8;
            color: #1a5276;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 600;
        }

        /* ─── CARDS ─── */
        .card {
            background: #f8f9fc;
            border-radius: 14px;
            padding: 18px 20px 22px;
            border: 1px solid #e8ecf1;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            color: #5d6d7e;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        /* ─── FORM ─── */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #5d6d7e;
            letter-spacing: 0.3px;
            margin-bottom: 3px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid #d5dbdb;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            background: #ffffff;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a5276;
            box-shadow: 0 0 0 4px rgba(26, 82, 118, 0.06);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 780px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .inline {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .inline-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 500px) {
            .inline,
            .inline-3 {
                grid-template-columns: 1fr;
            }
        }

        /* ─── BANK SELECTION ─── */
        .bank-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .bank-btn {
            padding: 7px 4px;
            border: 2px solid #d5dbdb;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            font-family: inherit;
            transition: 0.2s;
            text-align: center;
        }
        .bank-btn:hover {
            border-color: #1a5276;
            transform: translateY(-2px);
        }
        .bank-btn.active {
            border-color: #1a5276;
            background: #eaf2f8;
            color: #1a5276;
        }
        @media (max-width: 600px) {
            .bank-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .bank-preview {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 16px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #d5dbdb;
        }
        .bank-preview .logo-box {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
        }
        .bank-preview .bname {
            font-weight: 700;
            font-size: 16px;
        }
        .bank-preview .bsub {
            font-size: 11px;
            color: #7f8c8d;
        }

        /* ─── PILLS ─── */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .pill {
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            background: #e8ecf1;
            color: #2c3e50;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .pill:hover {
            background: #d5dbdb;
        }
        .pill.active {
            background: #1a5276;
            color: #fff;
            border-color: #1a5276;
        }

        /* ─── EXPENSES ─── */
        .expense-item {
            display: grid;
            grid-template-columns: 2fr 1fr 0.8fr 0.3fr;
            gap: 8px;
            align-items: center;
            background: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid #d5dbdb;
        }
        .expense-item input,
        .expense-item select {
            padding: 4px 8px;
            border: 1px solid #d5dbdb;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }
        .expense-item .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            cursor: pointer;
            font-weight: 700;
        }
        .add-btn {
            background: #eaf2f8;
            border: none;
            padding: 5px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            color: #1a5276;
            font-family: inherit;
            transition: 0.2s;
            margin-top: 4px;
        }
        .add-btn:hover {
            background: #d4e6f1;
        }

        /* ─── GENERATE BUTTON ─── */
        .gen-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1a5276, #0d2b44);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            margin-top: 18px;
            letter-spacing: 0.5px;
        }
        .gen-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(26, 82, 118, 0.25);
        }
        .gen-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── OUTPUT ─── */
        #output {
            display: none;
            margin-top: 28px;
        }
        #output.show {
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn-group button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            min-width: 100px;
            font-family: inherit;
            transition: 0.3s;
        }
        .btn-group button:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #1a5276;
            color: #fff;
        }
        .btn-secondary {
            background: #e8ecf1;
            color: #2c3e50;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }

        /* ─── PDF STATEMENT STYLES ─── */
        #statement-print {
            font-family: 'Courier New', monospace;
            background: #ffffff;
            padding: 24px 28px;
            max-width: 1000px;
            margin: 0 auto;
            font-size: 11.5px;
            line-height: 1.6;
            color: #1c1c1c;
            border: 1px solid #b0b0b0;
            border-radius: 4px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        #statement-print .bank-header {
            text-align: center;
            border-bottom: 2.5px solid #1c1c1c;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        #statement-print .bank-header .bank-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        #statement-print .bank-header .bank-name .sbi-color {
            color: #1a5276;
        }
        #statement-print .bank-header .bank-name .hdfc-color {
            color: #004d8c;
        }
        #statement-print .bank-header .bank-name .icici-color {
            color: #ed1c24;
        }
        #statement-print .bank-header .bank-name .axis-color {
            color: #a2001a;
        }
        #statement-print .bank-header .bank-name .kotak-color {
            color: #1a2b5c;
        }
        #statement-print .bank-header .bank-name .bob-color {
            color: #1f3a7a;
        }
        #statement-print .bank-header .bank-name .pnb-color {
            color: #b8860b;
        }
        #statement-print .bank-header .bank-name .indusind-color {
            color: #0066b3;
        }
        #statement-print .bank-header .bank-name .canara-color {
            color: #003366;
        }
        #statement-print .bank-header .bank-name .union-color {
            color: #1a3c6e;
        }
        #statement-print .bank-header .sub {
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }

        #statement-print .acc-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 30px;
            font-size: 10px;
            border-bottom: 1px dashed #aaa;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        #statement-print .acc-details .lbl {
            font-weight: 700;
        }

        #statement-print table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        #statement-print table th {
            background: #f0f2f5;
            text-align: left;
            padding: 4px 6px;
            border-bottom: 2px solid #1c1c1c;
            font-weight: 700;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #statement-print table td {
            padding: 3px 6px;
            border-bottom: 1px solid #eee;
            font-size: 9.5px;
        }
        #statement-print table .debit {
            color: #c0392b;
            font-weight: 700;
        }
        #statement-print table .credit {
            color: #27ae60;
            font-weight: 700;
        }
        #statement-print table .bal-neg {
            color: #c0392b;
        }

        #statement-print .summary-box {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px 14px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 10px;
            border: 1px solid #e0e0e0;
        }
        #statement-print .summary-box strong {
            font-weight: 700;
        }

        #statement-print .footer {
            margin-top: 12px;
            border-top: 2px solid #1c1c1c;
            padding-top: 8px;
            font-size: 8px;
            color: #555;
            text-align: center;
            line-height: 1.7;
            letter-spacing: 0.2px;
        }
        #statement-print .footer strong {
            color: #1a5276;
        }

        /* ─── DARK VARIANT ─── */
        #statement-print.dark {
            background: #1a1a2e;
            color: #e8e8e8;
            border-color: #444;
        }
        #statement-print.dark .bank-header {
            border-bottom-color: #555;
        }
        #statement-print.dark .bank-header .sub {
            color: #aaa;
        }
        #statement-print.dark table th {
            background: #2a2a4a;
            color: #e8e8e8;
            border-bottom-color: #555;
        }
        #statement-print.dark table td {
            border-bottom-color: #333;
        }
        #statement-print.dark .acc-details {
            border-bottom-color: #444;
        }
        #statement-print.dark .summary-box {
            background: #24243e;
            border-color: #444;
            color: #e8e8e8;
        }
        #statement-print.dark .footer {
            border-top-color: #555;
            color: #999;
        }
        #statement-print.dark .footer strong {
            color: #f39c12;
        }

        /* ─── PRINT PREVIEW MODAL ─── */
        #print-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #print-modal.show {
            display: flex;
        }
        #print-modal .modal-content {
            background: #fff;
            border-radius: 16px;
            max-width: 1100px;
            width: 100%;
            max-height: 95vh;
            overflow: auto;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        #print-modal .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        #print-modal .modal-actions button {
            padding: 10px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        #print-modal .modal-actions button:hover {
            transform: translateY(-2px);
        }
        #print-modal .modal-actions .close-modal {
            background: #e74c3c;
            color: #fff;
        }
        #print-modal .modal-actions .download-pdf {
            background: #1a5276;
            color: #fff;
        }
        #print-modal .modal-actions .print-pdf {
            background: #27ae60;
            color: #fff;
        }

        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 12px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.4s ease forwards;
            max-width: 400px;
            font-family: 'Segoe UI', sans-serif;
        }
        .toast-success {
            background: #27ae60;
        }
        .toast-error {
            background: #e74c3c;
        }
        .toast-info {
            background: #1a5276;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 600px) {
            .app {
                padding: 14px;
            }
            #statement-print {
                padding: 12px 14px;
                font-size: 9px;
            }
            #statement-print .acc-details {
                grid-template-columns: 1fr;
            }
            #statement-print .summary-box {
                grid-template-columns: 1fr 1fr;
            }
            #statement-print table {
                font-size: 8px;
            }
            #statement-print table td {
                font-size: 7.5px;
            }
            .bank-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="app">

        <!-- ─── HEADER ─── -->
        <div class="app-header">
            <div class="brand">Pro <span>Statement</span></div>
            <span class="badge">📄 Bank Statement Generator</span>
        </div>

        <!-- ─── BANK SELECTION ─── -->
        <div class="card">
            <div class="card-title">🏛️ Select Bank</div>
            <div class="bank-grid" id="bankGrid">
                <button class="bank-btn active" data-bank="sbi">SBI</button>
                <button class="bank-btn" data-bank="hdfc">HDFC</button>
                <button class="bank-btn" data-bank="icici">ICICI</button>
                <button class="bank-btn" data-bank="axis">Axis</button>
                <button class="bank-btn" data-bank="kotak">Kotak</button>
                <button class="bank-btn" data-bank="bob">BOB</button>
                <button class="bank-btn" data-bank="pnb">PNB</button>
                <button class="bank-btn" data-bank="indusind">IndusInd</button>
                <button class="bank-btn" data-bank="canara">Canara</button>
                <button class="bank-btn" data-bank="union">Union</button>
            </div>
            <div class="bank-preview">
                <div class="logo-box" id="logoBox" style="background:#1a5276;">SBI</div>
                <div>
                    <div class="bname" id="bankNameDisplay">State Bank of India</div>
                    <div class="bsub">Selected bank format</div>
                </div>
            </div>
        </div>

        <!-- ─── FORM ─── -->
        <div class="grid-2">

            <!-- LEFT -->
            <div>
                <div class="card">
                    <div class="card-title">👤 Account Details</div>
                    <div class="form-group">
                        <label>Account Holder Name</label>
                        <input type="text" id="accName" value="Ankit Sharma" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="email" value="ankitraj21805@gmail.com" />
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="address" value="Paramhans road jehanabad near Sai temple yellow building" />
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" id="accNum" value="45222567869" />
                        </div>
                        <div class="form-group">
                            <label>IFSC Code</label>
                            <input type="text" id="ifsc" value="SBIN0012193" />
                        </div>
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Branch Name</label>
                            <input type="text" id="branch" value="SATI VIDISHA" />
                        </div>
                        <div class="form-group">
                            <label>Branch Code</label>
                            <input type="text" id="branchCode" value="12193" />
                        </div>
                    </div>
                    <div class="inline-3">
                        <div class="form-group">
                            <label>CIF Number</label>
                            <input type="text" id="cif" value="92445569679" />
                        </div>
                        <div class="form-group">
                            <label>MICR Code</label>
                            <input type="text" id="micr" value="464002202" />
                        </div>
                        <div class="form-group">
                            <label>CKYCR</label>
                            <input type="text" id="ckycr" value="50046100545797" />
                        </div>
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Branch Phone</label>
                            <input type="text" id="branchPhone" value="09244076460" />
                        </div>
                        <div class="form-group">
                            <label>Interest Rate</label>
                            <input type="text" id="intRate" value="2.50" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div>
                <div class="card">
                    <div class="card-title">💼 Income &amp; Period</div>
                    <div class="form-group">
                        <label>Monthly Income (INR)</label>
                        <input type="number" id="monthlyIncome" value="195000" />
                    </div>
                    <div class="form-group">
                        <label>Employer</label>
                        <input type="text" id="employer" value="TATA STEEL LIMITED" />
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Salary Day</label>
                            <input type="number" id="salaryDay" value="1" min="1" max="28" />
                        </div>
                        <div class="form-group">
                            <label>Opening Balance</label>
                            <input type="number" id="openingBalance" value="75000" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Statement Period</label>
                        <div class="pill-group" id="periodGroup">
                            <span class="pill active" data-value="3">3 Months</span>
                            <span class="pill" data-value="6">6 Months</span>
                            <span class="pill" data-value="12">12 Months</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Spending Profile</label>
                        <div class="pill-group" id="profileGroup">
                            <span class="pill" data-value="conservative">Conservative</span>
                            <span class="pill active" data-value="moderate">Moderate</span>
                            <span class="pill" data-value="lavish">Lavish</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">🔄 Recurring Expenses</div>
                    <div id="expenseList">
                        <div class="expense-item">
                            <input type="text" placeholder="Name" value="HOME LOAN EMI" />
                            <input type="number" placeholder="Amount" value="15000" />
                            <select>
                                <option value="5" selected>Day 5</option>
                                <option value="10">Day 10</option>
                                <option value="15">Day 15</option>
                                <option value="20">Day 20</option>
                            </select>
                            <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
                        </div>
                        <div class="expense-item">
                            <input type="text" placeholder="Name" value="MUTUAL FUND SIP" />
                            <input type="number" placeholder="Amount" value="8000" />
                            <select>
                                <option value="5">Day 5</option>
                                <option value="10" selected>Day 10</option>
                                <option value="15">Day 15</option>
                                <option value="20">Day 20</option>
                            </select>
                            <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addExpense()">+ Add Recurring Expense</button>
                </div>

                <div class="card">
                    <div class="card-title">⚙️ PDF Settings</div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Variant</label>
                            <div class="pill-group" id="pdfVariant">
                                <span class="pill active" data-value="light">Light</span>
                                <span class="pill" data-value="dark">Dark</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Orientation</label>
                            <div class="pill-group" id="pdfOrientation">
                                <span class="pill active" data-value="portrait">Portrait</span>
                                <span class="pill" data-value="landscape">Landscape</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>PDF Password (optional)</label>
                        <input type="text" id="pdfPassword" placeholder="Leave empty" />
                    </div>
                </div>
            </div>
        </div>

        <button class="gen-btn" id="generateBtn" onclick="generateStatement()">⚡ Generate Statement</button>

        <!-- ─── OUTPUT ─── -->
        <div id="output">
            <div id="statementContent"></div>
            <div class="btn-group">
                <button class="btn-primary" onclick="openPrintModal()">📥 Preview & Download</button>
                <button class="btn-secondary" onclick="copyStatement()">📋 Copy Text</button>
                <button class="btn-success" onclick="saveToHistory()">💾 Save to History</button>
            </div>
        </div>
    </div>

    <!-- ─── PRINT MODAL ─── -->
    <div id="print-modal">
        <div class="modal-content">
            <div id="modalStatement"></div>
            <div class="modal-actions">
                <button class="close-modal" onclick="closePrintModal()">✕ Close</button>
                <button class="print-pdf" onclick="printPDF()">🖨️ Print</button>
                <button class="download-pdf" onclick="downloadPDF()">📥 Download PDF</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ─── TOAST ───
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateX(40px)';
                setTimeout(() => t.remove(), 400);
            }, 4000);
        }

        // ─── BANK DATA ───
        const banks = {
            sbi: { name: 'State Bank of India', short: 'SBI', color: '#1a5276', cls: 'sbi' },
            hdfc: { name: 'HDFC Bank', short: 'HDFC', color: '#004d8c', cls: 'hdfc' },
            icici: { name: 'ICICI Bank', short: 'ICICI', color: '#ed1c24', cls: 'icici' },
            axis: { name: 'Axis Bank', short: 'Axis', color: '#a2001a', cls: 'axis' },
            kotak: { name: 'Kotak Mahindra Bank', short: 'Kotak', color: '#1a2b5c', cls: 'kotak' },
            bob: { name: 'Bank of Baroda', short: 'BOB', color: '#1f3a7a', cls: 'bob' },
            pnb: { name: 'Punjab National Bank', short: 'PNB', color: '#b8860b', cls: 'pnb' },
            indusind: { name: 'IndusInd Bank', short: 'IndusInd', color: '#0066b3', cls: 'indusind' },
            canara: { name: 'Canara Bank', short: 'Canara', color: '#003366', cls: 'canara' },
            union: { name: 'Union Bank of India', short: 'Union', color: '#1a3c6e', cls: 'union' }
        };

        let generatedHTML = '';
        let statementHTML = '';

        // ─── BANK SELECTION ───
        document.querySelectorAll('.bank-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.bank-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateBankPreview();
            });
        });

        function updateBankPreview() {
            const key = document.querySelector('.bank-btn.active')?.dataset.bank || 'sbi';
            const bank = banks[key];
            if (bank) {
                document.getElementById('logoBox').textContent = bank.short;
                document.getElementById('logoBox').style.background = bank.color;
                document.getElementById('bankNameDisplay').textContent = bank.name;
            }
        }
        updateBankPreview();

        // ─── PILLS ───
        document.querySelectorAll('.pill-group').forEach(group => {
            group.querySelectorAll('.pill').forEach(pill => {
                pill.addEventListener('click', function() {
                    group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });

        // ─── EXPENSES ───
        function addExpense() {
            const list = document.getElementById('expenseList');
            const div = document.createElement('div');
            div.className = 'expense-item';
            div.innerHTML = `
                <input type="text" placeholder="Name" />
                <input type="number" placeholder="Amount" />
                <select>
                    <option value="5">Day 5</option>
                    <option value="10">Day 10</option>
                    <option value="15">Day 15</option>
                    <option value="20">Day 20</option>
                </select>
                <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(div);
        }

        // ─── HISTORY ───
        function saveToHistory() {
            if (!statementHTML) { showToast('⚠️ Generate first', 'warning'); return; }
            const name = document.getElementById('accName').value || 'Unnamed';
            let history = JSON.parse(localStorage.getItem('statementHistory') || '[]');
            history.push({ name, date: new Date().toLocaleDateString('en-IN'), html: statementHTML });
            localStorage.setItem('statementHistory', JSON.stringify(history));
            showToast('💾 Saved to history!', 'success');
        }

        // ═══════════════════════════════════════════════
        // ─── GENERATE STATEMENT ───
        // ═══════════════════════════════════════════════

        function generateStatement() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            setTimeout(() => {
                try {
                    const bankKey = document.querySelector('.bank-btn.active')?.dataset.bank || 'sbi';
                    const bank = banks[bankKey];

                    const name = document.getElementById('accName').value || 'Customer Name';
                    const email = document.getElementById('email').value || '—';
                    const address = document.getElementById('address').value || '—';
                    const accNum = document.getElementById('accNum').value || '00000000000000';
                    const ifsc = document.getElementById('ifsc').value || 'SBIN0000000';
                    const branch = document.getElementById('branch').value || 'MAIN BRANCH';
                    const branchCode = document.getElementById('branchCode').value || '00000';
                    const cif = document.getElementById('cif').value || '00000000000';
                    const micr = document.getElementById('micr').value || '000000000';
                    const ckycr = document.getElementById('ckycr').value || '00000000000000';
                    const branchPhone = document.getElementById('branchPhone').value || '0000000000';
                    const intRate = document.getElementById('intRate').value || '2.50';

                    const monthlyIncome = Number(document.getElementById('monthlyIncome').value) || 0;
                    const employer = document.getElementById('employer').value || '—';
                    const salaryDay = Number(document.getElementById('salaryDay').value) || 1;
                    let openingBal = Number(document.getElementById('openingBalance').value);
                    if (!openingBal || openingBal < 0) openingBal = 45000;

                    const period = Number(document.querySelector('#periodGroup .active')?.dataset.value) || 3;
                    const profile = document.querySelector('#profileGroup .active')?.dataset.value || 'moderate';
                    const pdfVariant = document.querySelector('#pdfVariant .active')?.dataset.value || 'light';

                    // Recurring expenses
                    const expenseItems = document.querySelectorAll('#expenseList .expense-item');
                    const recurring = [];
                    expenseItems.forEach(item => {
                        const inputs = item.querySelectorAll('input');
                        const sel = item.querySelector('select');
                        if (inputs[0] && inputs[1] && sel) {
                            const nameVal = inputs[0].value.trim() || 'Expense';
                            const amt = Number(inputs[1].value) || 0;
                            const day = Number(sel.value) || 5;
                            if (amt > 0) recurring.push({ name: nameVal, amount: amt, day });
                        }
                    });

                    // ─── Build transactions ───
                    const startDate = new Date();
                    startDate.setMonth(startDate.getMonth() - period);
                    startDate.setDate(1);

                    let balance = openingBal;
                    const transactions = [];
                    const today = new Date();

                    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                    let spendMult = 1;
                    if (profile === 'conservative') spendMult = 0.55;
                    else if (profile === 'lavish') spendMult = 1.9;

                    const upiNames = ['HARISH', 'KIRANS', 'KOMALR', 'GAURAV', 'POOJAM', 'SUMITS', 'DIVYAR', 'ANILR',
                        'LATAC', 'SHAHID', 'SOHAIL', 'AJAYG', 'KIRANT', 'DEEPAK', 'DIVYAB', 'RAHULS', 'SHOEHA',
                        'FAHEEM', 'SWATIT', 'ROHITD', 'SANTOS', 'ASHISH', 'PRAVEE', 'AMITS', 'NITINP', 'ARIFM',
                        'KANCHA', 'GEETAS', 'SURESH', 'IRFANM', 'MADHUR', 'MAHESH', 'PRIYAS', 'PANKAJ', 'POONAM',
                        'SAVITA', 'VINODS', 'BHAVNA', 'USHAK'
                    ];
                    const bankCodes = ['UBIN', 'PUNB', 'UTIB', 'KKBK', 'INDB', 'CBIN', 'IDIB', 'HDFC', 'CNRB', 'BARB',
                        'SBIN', 'ICIC', 'YESB', 'IDFB', 'BKID', 'AIRP'
                    ];

                    // Opening balance
                    transactions.push({
                        date: new Date(startDate),
                        desc: 'Opening Balance',
                        credit: openingBal,
                        debit: 0,
                        balance: openingBal,
                        ref: '—',
                        isOpening: true
                    });

                    for (let m = 0; m < period; m++) {
                        const date = new Date(startDate);
                        date.setMonth(date.getMonth() + m);
                        const month = date.getMonth();
                        const year = date.getFullYear();

                        // Salary
                        if (monthlyIncome > 0) {
                            const salDate = new Date(year, month, salaryDay);
                            if (salDate <= today) {
                                balance += monthlyIncome;
                                transactions.push({
                                    date: salDate,
                                    desc: `BY TRANSFER-SALARY/${employer}`,
                                    credit: monthlyIncome,
                                    debit: 0,
                                    balance: balance,
                                    ref: `SAL/${String(rand(1000, 9999))}`,
                                    isOpening: false
                                });
                            }
                        }

                        // Recurring
                        recurring.forEach(exp => {
                            const expDate = new Date(year, month, exp.day);
                            if (expDate <= today) {
                                balance -= exp.amount;
                                transactions.push({
                                    date: expDate,
                                    desc: `TO TRANSFER-AUTO/${exp.name}`,
                                    credit: 0,
                                    debit: exp.amount,
                                    balance: balance,
                                    ref: `AUTO/${String(rand(1000, 9999))}`,
                                    isOpening: false
                                });
                            }
                        });

                        // Random daily UPI
                        const daysInMonth = new Date(year, month + 1, 0).getDate();
                        for (let d = 1; d <= daysInMonth; d++) {
                            const curDate = new Date(year, month, d);
                            if (curDate <= new Date(startDate)) continue;
                            if (curDate > today) continue;

                            const isWeekend = (curDate.getDay() === 0 || curDate.getDay() === 6);
                            let prob = isWeekend ? 0.50 * spendMult : 0.25 * spendMult;
                            const isFestival = (d >= 10 && d <= 15) || (d >= 22 && d <= 28);
                            if (isFestival) prob *= 1.3;

                            if (Math.random() < prob) {
                                const amt = Math.round((rand(200, 5000) * spendMult) / 100) * 100;
                                const name1 = upiNames[rand(0, upiNames.length - 1)];
                                const bank1 = bankCodes[rand(0, bankCodes.length - 1)];
                                const refNum = String(rand(100000000000, 999999999999));
                                const isDebit = Math.random() < 0.6;

                                if (isDebit) {
                                    balance -= amt;
                                    transactions.push({
                                        date: curDate,
                                        desc: `TO TRANSFER-UPI/DR/${refNum}/${name1}/${bank1}/${String(rand(1000000000, 9999999999))}/Payme`,
                                        credit: 0,
                                        debit: amt,
                                        balance: balance,
                                        ref: refNum,
                                        isOpening: false
                                    });
                                } else {
                                    balance += amt;
                                    transactions.push({
                                        date: curDate,
                                        desc: `BY TRANSFER-UPI/CR/${refNum}/${name1}/${bank1}/${String(rand(1000000000, 9999999999))}/Payme`,
                                        credit: amt,
                                        debit: 0,
                                        balance: balance,
                                        ref: refNum,
                                        isOpening: false
                                    });
                                }
                            }
                        }
                    }

                    transactions.sort((a, b) => a.date - b.date);

                    // ─── Build HTML ───
                    const variantClass = pdfVariant === 'dark' ? 'dark' : '';
                    const bankCls = bank ? bank.cls : 'sbi';
                    const bankName = bank ? bank.name : 'Bank';
                    const bankShort = bank ? bank.short : 'SBI';

                    let rows = '';
                    let totalDebits = 0,
                        totalCredits = 0;

                    transactions.forEach((t) => {
                        const dateStr = t.date.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit',
                            year: 'numeric' });
                        const debitStr = t.debit > 0 ? t.debit.toLocaleString() : '—';
                        const creditStr = t.credit > 0 ? t.credit.toLocaleString() : '—';

                        let balStr = Math.round(t.balance).toLocaleString();
                        if (t.balance < 0) balStr = '-' + Math.abs(Math.round(t.balance)).toLocaleString();
                        const balClass = t.balance < 0 ? 'bal-neg' : '';

                        if (t.debit > 0) totalDebits += t.debit;
                        if (t.credit > 0) totalCredits += t.credit;

                        const rowStyle = t.isOpening ? 'font-weight:700;background:#f8f9fa;' : '';

                        rows += `
                            <tr style="${rowStyle}">
                                <td>${dateStr}</td>
                                <td>${dateStr}</td>
                                <td style="font-size:8.5px;">${t.desc}</td>
                                <td style="font-size:8.5px;">${t.ref || '—'}</td>
                                <td class="${t.debit > 0 ? 'debit' : ''}">${debitStr}</td>
                                <td class="${t.credit > 0 ? 'credit' : ''}">${creditStr}</td>
                                <td class="${balClass}">${balStr}</td>
                            </tr>
                        `;
                    });

                    const closingBal = transactions.length > 0 ? Math.round(transactions[transactions.length - 1]
                        .balance) : openingBal;
                    let closingDisplay = closingBal.toLocaleString();
                    if (closingBal < 0) closingDisplay = '-' + Math.abs(closingBal).toLocaleString();
                    const closingClass = closingBal < 0 ? 'bal-neg' : '';

                    const periodStart = new Date(startDate);
                    const periodEnd = new Date(today);
                    const periodStr =
                        `${periodStart.toLocaleDateString('en-IN', {day:'2-digit',month:'2-digit',year:'numeric'})} to ${periodEnd.toLocaleDateString('en-IN', {day:'2-digit',month:'2-digit',year:'numeric'})}`;
                    const genDate = today.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit',
                        year: 'numeric' });
                    const accountOpenDate = new Date(startDate);
                    accountOpenDate.setFullYear(accountOpenDate.getFullYear() - 3);
                    const openDateStr = accountOpenDate.toLocaleDateString('en-IN', { day: '2-digit',
                        month: '2-digit', year: 'numeric' });

                    let openingDisplay = openingBal.toLocaleString();

                    const html = `
                        <div id="statement-print" class="${variantClass}">
                            <div class="bank-header">
                                <div class="bank-name"><span class="${bankCls}-color">${bankName}</span></div>
                                <div class="sub">${bankShort} BANK · ${branch} · Branch Code: ${branchCode}</div>
                            </div>
                            <div class="acc-details">
                                <span><span class="lbl">Account Holder:</span> ${name}</span>
                                <span><span class="lbl">Account No:</span> ${accNum}</span>
                                <span><span class="lbl">IFSC:</span> ${ifsc}</span>
                                <span><span class="lbl">Branch:</span> ${branch}</span>
                                <span><span class="lbl">MICR:</span> ${micr}</span>
                                <span><span class="lbl">CIF No:</span> ${cif}</span>
                                <span style="grid-column:1/-1;"><span class="lbl">Address:</span> ${address}</span>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Value Date</th>
                                        <th>Post Date</th>
                                        <th>Details</th>
                                        <th>Ref No/Cheque No</th>
                                        <th>Debit</th>
                                        <th>Credit</th>
                                        <th>Balance</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rows}
                                    <tr style="font-weight:700;border-top:2px solid #1c1c1c;background:#f8f9fa;">
                                        <td colspan="4" style="text-align:right;">TOTAL</td>
                                        <td class="debit">${Math.round(totalDebits).toLocaleString()}</td>
                                        <td class="credit">${Math.round(totalCredits).toLocaleString()}</td>
                                        <td class="${closingClass}">${closingDisplay}</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="summary-box">
                                <span><strong>Opening Balance:</strong> ${openingDisplay}</span>
                                <span><strong>Total Debits:</strong> ${Math.round(totalDebits).toLocaleString()}</span>
                                <span><strong>Total Credits:</strong> ${Math.round(totalCredits).toLocaleString()}</span>
                                <span><strong>Closing Balance:</strong> ${closingDisplay}</span>
                            </div>
                            <div class="footer">
                                <strong>${bankName}</strong> · ${branch} · ${ifsc}<br />
                                Please do not share your ATM, Debit/Credit Card number, PIN, OTP, Username or Password with anyone via email, SMS, phone call, or any other medium.
                                Bank never asks for such information. If your account is operated by a Power of Attorney holder, please review the transactions with extra care.
                                This is a computer generated statement and does not require a signature.
                            </div>
                        </div>
                    `;

                    document.getElementById('statementContent').innerHTML = html;
                    statementHTML = html;
                    generatedHTML = html;
                    document.getElementById('output').classList.add('show');

                    btn.disabled = false;
                    btn.textContent = '⚡ Generate Statement';
                    showToast('✅ Statement generated!', 'success');

                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = '⚡ Generate Statement';
                    showToast('❌ Error: ' + err.message, 'error');
                    console.error(err);
                }
            }, 600);
        }

        // ─── PRINT MODAL ───
        function openPrintModal() {
            if (!generatedHTML) {
                showToast('❌ Generate a statement first.', 'error');
                return;
            }
            document.getElementById('modalStatement').innerHTML = generatedHTML;
            document.getElementById('print-modal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closePrintModal() {
            document.getElementById('print-modal').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        // ─── DOWNLOAD PDF (html2canvas + jsPDF) ───
        function downloadPDF() {
            const element = document.querySelector('#modalStatement #statement-print');
            if (!element) {
                showToast('❌ No statement found.', 'error');
                return;
            }

            showToast('⏳ Generating PDF...', 'info');

            const orientation = document.querySelector('#pdfOrientation .active')?.dataset.value || 'portrait';

            html2canvas(element, {
                scale: 2.5,
                useCORS: true,
                logging: false,
                backgroundColor: '#ffffff',
                width: element.scrollWidth,
                height: element.scrollHeight
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/jpeg', 1.0);

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: orientation,
                    unit: 'mm',
                    format: 'a4'
                });

                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();

                const imgWidth = pdfWidth;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;

                let heightLeft = imgHeight;
                let position = 0;

                pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                heightLeft -= pdfHeight;

                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pdfHeight;
                }

                const bankKey = document.querySelector('.bank-btn.active')?.dataset.bank || 'sbi';
                const bank = banks[bankKey];
                const fileName =
                    `${bank ? bank.short : 'Bank'}_Statement_${new Date().toISOString().slice(0,10)}.pdf`;

                pdf.save(fileName);
                closePrintModal();
                showToast('📥 PDF downloaded!', 'success');
            }).catch(err => {
                showToast('❌ Error: ' + err.message, 'error');
                console.error(err);
            });
        }

        // ─── PRINT ───
        function printPDF() {
            window.print();
        }

        // ─── COPY ───
        function copyStatement() {
            const element = document.querySelector('#statement-print');
            if (!element) { showToast('❌ Generate first', 'error'); return; }
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => { showToast('📋 Copied!', 'success'); }).catch(() => {
                const range = document.createRange();
                range.selectNode(element);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                showToast('📋 Copied!', 'success');
            });
        }

        console.log('🚀 Pro Statement Loaded. Ready to generate.');
    </script>

</body>
