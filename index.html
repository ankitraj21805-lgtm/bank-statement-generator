<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Statement - Professional Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #eef1f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 1100px;
            width: 100%;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06);
            padding: 28px 32px 32px;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 2px solid #eef2f7;
            margin-bottom: 22px;
        }
        .app-header .brand {
            font-size: 24px;
            font-weight: 800;
            color: #1a5276;
        }
        .app-header .brand span {
            color: #f39c12;
        }
        .app-header .badge {
            font-size: 12px;
            background: #eaf2f8;
            color: #1a5276;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 600;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 780px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 16px 18px 20px;
            border: 1px solid #e8ecf1;
            margin-bottom: 14px;
        }
        .card-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #5d6d7e;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: #5d6d7e;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 7px 12px;
            border: 1px solid #d5dbdb;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            background: #fff;
            transition: 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a5276;
            box-shadow: 0 0 0 4px rgba(26, 82, 118, 0.06);
        }

        .inline {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .inline-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        @media (max-width: 500px) {
            .inline,
            .inline-3 {
                grid-template-columns: 1fr;
            }
        }

        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .pill {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: #e8ecf1;
            color: #2c3e50;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .pill:hover {
            background: #d5dbdb;
        }
        .pill.active {
            background: #1a5276;
            color: #fff;
            border-color: #1a5276;
        }

        .gen-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a5276, #0d2b44);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Segoe UI', sans-serif;
            margin-top: 14px;
        }
        .gen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(26, 82, 118, 0.2);
        }
        .gen-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #output {
            display: none;
            margin-top: 24px;
        }
        #output.show {
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .btn-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            min-width: 80px;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s;
        }
        .btn-group button:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: #1a5276;
            color: #fff;
        }
        .btn-secondary {
            background: #e8ecf1;
            color: #2c3e50;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }

        /* ═══════════════════════════════════════════ */
        /* ─── EXACT PDF REPLICA ─── */
        /* ═══════════════════════════════════════════ */

        .statement-pdf {
            font-family: 'Courier New', monospace;
            background: #ffffff;
            padding: 18px 22px;
            max-width: 1000px;
            margin: 0 auto;
            font-size: 10.5px;
            line-height: 1.5;
            color: #1c1c1c;
            border: 1px solid #b0b0b0;
        }

        /* ─── BANK HEADER ─── */
        .statement-pdf .bank-header {
            text-align: center;
            border-bottom: 2px solid #1c1c1c;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .statement-pdf .bank-header .bank-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .statement-pdf .bank-header .bank-name .sbi-color {
            color: #1a5276;
        }
        .statement-pdf .bank-header .bank-name .hdfc-color {
            color: #004d8c;
        }
        .statement-pdf .bank-header .bank-name .icici-color {
            color: #ed1c24;
        }
        .statement-pdf .bank-header .bank-name .axis-color {
            color: #a2001a;
        }
        .statement-pdf .bank-header .bank-name .kotak-color {
            color: #1a2b5c;
        }
        .statement-pdf .bank-header .bank-name .bob-color {
            color: #1f3a7a;
        }
        .statement-pdf .bank-header .bank-name .pnb-color {
            color: #b8860b;
        }
        .statement-pdf .bank-header .bank-name .indusind-color {
            color: #0066b3;
        }
        .statement-pdf .bank-header .bank-name .canara-color {
            color: #003366;
        }
        .statement-pdf .bank-header .bank-name .union-color {
            color: #1a3c6e;
        }
        .statement-pdf .bank-header .sub {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
        }

        /* ─── ACCOUNT DETAILS ─── */
        .statement-pdf .acc-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px 25px;
            font-size: 9.5px;
            border-bottom: 1px dashed #aaa;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .statement-pdf .acc-details .lbl {
            font-weight: 700;
        }

        /* ─── TABLE ─── */
        .statement-pdf table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9.5px;
        }
        .statement-pdf table th {
            background: #f0f2f5;
            text-align: left;
            padding: 3px 5px;
            border-bottom: 2px solid #1c1c1c;
            font-weight: 700;
            font-size: 8.5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .statement-pdf table td {
            padding: 2px 5px;
            border-bottom: 1px solid #eee;
        }
        .statement-pdf table .debit {
            color: #c0392b;
            font-weight: 700;
        }
        .statement-pdf table .credit {
            color: #27ae60;
            font-weight: 700;
        }
        .statement-pdf table .bal-neg {
            color: #c0392b;
        }

        /* ─── FOOTER ─── */
        .statement-pdf .footer {
            margin-top: 10px;
            border-top: 2px solid #1c1c1c;
            padding-top: 6px;
            font-size: 7.5px;
            color: #555;
            text-align: center;
            line-height: 1.7;
            letter-spacing: 0.2px;
        }
        .statement-pdf .footer strong {
            color: #1a5276;
        }

        .statement-pdf .summary-box {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
            background: #f8f9fa;
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 9px;
            border: 1px solid #e0e0e0;
        }
        .statement-pdf .summary-box strong {
            font-weight: 700;
        }

        /* ─── DARK VARIANT ─── */
        .statement-pdf.dark {
            background: #1a1a2e;
            color: #e8e8e8;
            border-color: #444;
        }
        .statement-pdf.dark .bank-header {
            border-bottom-color: #555;
        }
        .statement-pdf.dark .bank-header .sub {
            color: #aaa;
        }
        .statement-pdf.dark table th {
            background: #2a2a4a;
            color: #e8e8e8;
            border-bottom-color: #555;
        }
        .statement-pdf.dark table td {
            border-bottom-color: #333;
        }
        .statement-pdf.dark .acc-details {
            border-bottom-color: #444;
        }
        .statement-pdf.dark .summary-box {
            background: #24243e;
            border-color: #444;
            color: #e8e8e8;
        }
        .statement-pdf.dark .footer {
            border-top-color: #555;
            color: #999;
        }
        .statement-pdf.dark .footer strong {
            color: #f39c12;
        }

        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 12px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.4s ease forwards;
            max-width: 400px;
            font-family: 'Segoe UI', sans-serif;
        }
        .toast-success {
            background: #27ae60;
        }
        .toast-error {
            background: #e74c3c;
        }
        .toast-info {
            background: #1a5276;
        }
        .toast-warning {
            background: #f39c12;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .app {
                padding: 14px;
            }
            .statement-pdf {
                padding: 10px 12px;
                font-size: 8px;
            }
            .statement-pdf .acc-details {
                grid-template-columns: 1fr;
            }
            .statement-pdf .summary-box {
                grid-template-columns: 1fr 1fr;
            }
            .statement-pdf table {
                font-size: 7px;
            }
            .statement-pdf table th,
            .statement-pdf table td {
                padding: 2px 3px;
            }
        }
    </style>
</head>
<body>

    <div class="app">

        <!-- ─── HEADER ─── -->
        <div class="app-header">
            <div class="brand">Pro <span>Statement</span></div>
            <span class="badge">📄 PDF Replica</span>
        </div>

        <!-- ─── BANK SELECTION ─── -->
        <div class="card" style="margin-bottom:14px;">
            <div class="card-title">🏛️ Select Bank</div>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;" id="bankGrid">
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="sbi">SBI</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="hdfc">HDFC</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="icici">ICICI</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="axis">Axis</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="kotak">Kotak</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="bob">BOB</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="pnb">PNB</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="indusind">IndusInd</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="canara">Canara</button>
                <button class="bank-btn" style="padding:5px 2px;border:2px solid #d5dbdb;border-radius:6px;background:#fff;cursor:pointer;font-weight:700;font-size:11px;font-family:'Segoe UI',sans-serif;transition:0.2s;" data-bank="union">Union</button>
            </div>
            <div style="display:flex;align-items:center;gap:12px;padding:6px 14px;background:#fff;border-radius:6px;border:1px solid #d5dbdb;">
                <div id="logoBox" style="width:36px;height:36px;border-radius:6px;background:#1a5276;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;font-family:'Arial Black',sans-serif;">SBI</div>
                <div>
                    <div id="bankNameDisplay" style="font-weight:700;font-size:14px;font-family:'Segoe UI',sans-serif;">State Bank of India</div>
                    <div style="font-size:10px;color:#5d6d7e;font-family:'Segoe UI',sans-serif;">Selected bank format</div>
                </div>
            </div>
        </div>

        <!-- ─── FORM ─── -->
        <div class="grid-2">

            <!-- LEFT -->
            <div>
                <div class="card">
                    <div class="card-title">👤 Account Details</div>
                    <div class="form-group">
                        <label>Account Holder Name</label>
                        <input type="text" id="accName" value="Ankit Sharma" />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" id="email" value="ankitraj21805@gmail.com" />
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="address" value="Paramhans road jehanabad near Sai temple yellow building" />
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Account Number</label>
                            <input type="text" id="accNum" value="45222567869" />
                        </div>
                        <div class="form-group">
                            <label>IFSC Code</label>
                            <input type="text" id="ifsc" value="SBIN0012193" />
                        </div>
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Branch Name</label>
                            <input type="text" id="branch" value="SATI VIDISHA" />
                        </div>
                        <div class="form-group">
                            <label>Branch Code</label>
                            <input type="text" id="branchCode" value="12193" />
                        </div>
                    </div>
                    <div class="inline-3">
                        <div class="form-group">
                            <label>CIF Number</label>
                            <input type="text" id="cif" value="92445569679" />
                        </div>
                        <div class="form-group">
                            <label>MICR Code</label>
                            <input type="text" id="micr" value="464002202" />
                        </div>
                        <div class="form-group">
                            <label>CKYCR</label>
                            <input type="text" id="ckycr" value="50046100545797" />
                        </div>
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Branch Phone</label>
                            <input type="text" id="branchPhone" value="09244076460" />
                        </div>
                        <div class="form-group">
                            <label>Interest Rate</label>
                            <input type="text" id="intRate" value="2.50" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div>
                <div class="card">
                    <div class="card-title">💼 Income &amp; Period</div>
                    <div class="form-group">
                        <label>Monthly Income (INR)</label>
                        <input type="number" id="monthlyIncome" value="195000" />
                    </div>
                    <div class="form-group">
                        <label>Employer</label>
                        <input type="text" id="employer" value="TATA STEEL LIMITED" />
                    </div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Salary Day</label>
                            <input type="number" id="salaryDay" value="1" />
                        </div>
                        <div class="form-group">
                            <label>Opening Balance</label>
                            <input type="number" id="openingBalance" value="75000" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Statement Period</label>
                        <div class="pill-group" id="periodGroup">
                            <span class="pill active" data-value="3">3 Months</span>
                            <span class="pill" data-value="6">6 Months</span>
                            <span class="pill" data-value="12">12 Months</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Spending Profile</label>
                        <div class="pill-group" id="profileGroup">
                            <span class="pill" data-value="conservative">Conservative</span>
                            <span class="pill active" data-value="moderate">Moderate</span>
                            <span class="pill" data-value="lavish">Lavish</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">🔄 Recurring Expenses</div>
                    <div id="expenseList">
                        <div style="display:grid;grid-template-columns:2fr 1fr 0.8fr 0.3fr;gap:5px;align-items:center;background:#fff;padding:4px 8px;border-radius:6px;margin-bottom:4px;border:1px solid #d5dbdb;">
                            <input type="text" placeholder="Name" value="HOME LOAN EMI" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                            <input type="number" placeholder="Amount" value="15000" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                            <select style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;">
                                <option value="5" selected>Day 5</option>
                                <option value="10">Day 10</option>
                                <option value="15">Day 15</option>
                                <option value="20">Day 20</option>
                            </select>
                            <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;font-weight:700;">✕</button>
                        </div>
                        <div style="display:grid;grid-template-columns:2fr 1fr 0.8fr 0.3fr;gap:5px;align-items:center;background:#fff;padding:4px 8px;border-radius:6px;margin-bottom:4px;border:1px solid #d5dbdb;">
                            <input type="text" placeholder="Name" value="MUTUAL FUND SIP" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                            <input type="number" placeholder="Amount" value="8000" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                            <select style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;">
                                <option value="5">Day 5</option>
                                <option value="10" selected>Day 10</option>
                                <option value="15">Day 15</option>
                                <option value="20">Day 20</option>
                            </select>
                            <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;font-weight:700;">✕</button>
                        </div>
                    </div>
                    <button class="add-btn" onclick="addExpense()" style="background:#eaf2f8;border:none;padding:3px 14px;border-radius:20px;font-weight:600;font-size:11px;cursor:pointer;color:#1a5276;font-family:'Segoe UI',sans-serif;margin-top:4px;">+ Add</button>
                </div>

                <div class="card">
                    <div class="card-title">⚙️ PDF Settings</div>
                    <div class="inline">
                        <div class="form-group">
                            <label>Variant</label>
                            <div class="pill-group" id="pdfVariant">
                                <span class="pill active" data-value="light">Light</span>
                                <span class="pill" data-value="dark">Dark</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Orientation</label>
                            <div class="pill-group" id="pdfOrientation">
                                <span class="pill active" data-value="portrait">Portrait</span>
                                <span class="pill" data-value="landscape">Landscape</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>PDF Password (optional)</label>
                        <input type="text" id="pdfPassword" placeholder="Leave empty" />
                    </div>
                </div>
            </div>
        </div>

        <button class="gen-btn" id="generateBtn" onclick="generateStatement()">⚡ Generate Statement</button>

        <div id="output">
            <div id="statementContent"></div>
            <div class="btn-group">
                <button class="btn-primary" onclick="downloadPDF()">📥 Download PDF</button>
                <button class="btn-secondary" onclick="copyStatement()">📋 Copy</button>
                <button class="btn-success" onclick="saveToHistory()">💾 Save</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ─── TOAST ───
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0';
                setTimeout(() => t.remove(), 400); }, 4000);
        }

        // ─── BANK DATA ───
        const banks = {
            sbi: { name: 'State Bank of India', short: 'SBI', color: '#1a5276', cls: 'sbi' },
            hdfc: { name: 'HDFC Bank', short: 'HDFC', color: '#004d8c', cls: 'hdfc' },
            icici: { name: 'ICICI Bank', short: 'ICICI', color: '#ed1c24', cls: 'icici' },
            axis: { name: 'Axis Bank', short: 'Axis', color: '#a2001a', cls: 'axis' },
            kotak: { name: 'Kotak Mahindra Bank', short: 'Kotak', color: '#1a2b5c', cls: 'kotak' },
            bob: { name: 'Bank of Baroda', short: 'BOB', color: '#1f3a7a', cls: 'bob' },
            pnb: { name: 'Punjab National Bank', short: 'PNB', color: '#b8860b', cls: 'pnb' },
            indusind: { name: 'IndusInd Bank', short: 'IndusInd', color: '#0066b3', cls: 'indusind' },
            canara: { name: 'Canara Bank', short: 'Canara', color: '#003366', cls: 'canara' },
            union: { name: 'Union Bank of India', short: 'Union', color: '#1a3c6e', cls: 'union' }
        };

        let history = [];
        let statementCount = 0;
        let currentHTML = '';

        // ─── BANK SELECTION ───
        document.querySelectorAll('.bank-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.bank-btn').forEach(b => b.style.borderColor = '#d5dbdb');
                this.style.borderColor = '#1a5276';
                this.style.background = '#eaf2f8';
                updateBankPreview();
            });
        });

        function updateBankPreview() {
            let key = 'sbi';
            document.querySelectorAll('.bank-btn').forEach(b => {
                if (b.style.borderColor === '#1a5276') key = b.dataset.bank;
            });
            const bank = banks[key];
            if (bank) {
                document.getElementById('logoBox').textContent = bank.short;
                document.getElementById('logoBox').style.background = bank.color;
                document.getElementById('bankNameDisplay').textContent = bank.name;
            }
        }

        // Set default active bank
        document.querySelector('.bank-btn[data-bank="sbi"]').style.borderColor = '#1a5276';
        document.querySelector('.bank-btn[data-bank="sbi"]').style.background = '#eaf2f8';
        updateBankPreview();

        // ─── PILLS ───
        document.querySelectorAll('.pill-group').forEach(group => {
            group.querySelectorAll('.pill').forEach(pill => {
                pill.addEventListener('click', function() {
                    group.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        });

        // ─── EXPENSES ───
        function addExpense() {
            const list = document.getElementById('expenseList');
            const div = document.createElement('div');
            div.style.cssText =
                'display:grid;grid-template-columns:2fr 1fr 0.8fr 0.3fr;gap:5px;align-items:center;background:#fff;padding:4px 8px;border-radius:6px;margin-bottom:4px;border:1px solid #d5dbdb;';
            div.innerHTML = `
                <input type="text" placeholder="Name" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                <input type="number" placeholder="Amount" style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;" />
                <select style="padding:3px 6px;border:1px solid #d5dbdb;border-radius:4px;font-size:11px;font-family:'Segoe UI',sans-serif;">
                    <option value="5">Day 5</option>
                    <option value="10">Day 10</option>
                    <option value="15">Day 15</option>
                    <option value="20">Day 20</option>
                </select>
                <button class="remove-btn" onclick="this.parentElement.remove()" style="background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;font-weight:700;">✕</button>
            `;
            list.appendChild(div);
        }

        // ─── HISTORY ───
        function saveToHistory() {
            if (!currentHTML) { showToast('⚠️ Generate first', 'warning'); return; }
            const name = document.getElementById('accName').value || 'Unnamed';
            history.push({ name, date: new Date().toLocaleDateString('en-IN'), html: currentHTML });
            localStorage.setItem('statementHistory', JSON.stringify(history));
            showToast('💾 Saved!', 'success');
        }

        // ═══════════════════════════════════════════════
        // ─── GENERATE STATEMENT ───
        // ═══════════════════════════════════════════════
        function generateStatement() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            setTimeout(() => {
                try {
                    // Get selected bank
                    let bankKey = 'sbi';
                    document.querySelectorAll('.bank-btn').forEach(b => {
                        if (b.style.borderColor === '#1a5276') bankKey = b.dataset.bank;
                    });
                    const bank = banks[bankKey];

                    const name = document.getElementById('accName').value || 'Customer Name';
                    const email = document.getElementById('email').value || '—';
                    const address = document.getElementById('address').value || '—';
                    const accNum = document.getElementById('accNum').value || '00000000000000';
                    const ifsc = document.getElementById('ifsc').value || 'SBIN0000000';
                    const branch = document.getElementById('branch').value || 'MAIN BRANCH';
                    const branchCode = document.getElementById('branchCode').value || '00000';
                    const cif = document.getElementById('cif').value || '00000000000';
                    const micr = document.getElementById('micr').value || '000000000';
                    const ckycr = document.getElementById('ckycr').value || '00000000000000';
                    const branchPhone = document.getElementById('branchPhone').value || '0000000000';
                    const intRate = document.getElementById('intRate').value || '2.50';

                    const monthlyIncome = Number(document.getElementById('monthlyIncome').value) || 0;
                    const employer = document.getElementById('employer').value || '—';
                    const salaryDay = Number(document.getElementById('salaryDay').value) || 1;
                    let openingBal = Number(document.getElementById('openingBalance').value);
                    if (!openingBal || openingBal < 0) openingBal = 45000;

                    const period = Number(document.querySelector('#periodGroup .active')?.dataset.value) || 3;
                    const profile = document.querySelector('#profileGroup .active')?.dataset.value || 'moderate';
                    const pdfVariant = document.querySelector('#pdfVariant .active')?.dataset.value || 'light';

                    // Recurring expenses
                    const expenseItems = document.querySelectorAll('#expenseList > div');
                    const recurring = [];
                    expenseItems.forEach(item => {
                        const inputs = item.querySelectorAll('input');
                        const sel = item.querySelector('select');
                        if (inputs[0] && inputs[1] && sel) {
                            const nameVal = inputs[0].value.trim() || 'Expense';
                            const amt = Number(inputs[1].value) || 0;
                            const day = Number(sel.value) || 5;
                            if (amt > 0) recurring.push({ name: nameVal, amount: amt, day });
                        }
                    });

                    // ─── Build transactions ───
                    const startDate = new Date();
                    startDate.setMonth(startDate.getMonth() - period);
                    startDate.setDate(1);

                    let balance = openingBal;
                    const transactions = [];
                    const today = new Date();

                    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                    let spendMult = 1;
                    if (profile === 'conservative') spendMult = 0.55;
                    else if (profile === 'lavish') spendMult = 1.9;

                    const upiNames = ['HARISH', 'KIRANS', 'KOMALR', 'GAURAV', 'POOJAM', 'SUMITS', 'DIVYAR', 'ANILR',
                        'LATAC', 'SHAHID', 'SOHAIL', 'AJAYG', 'KIRANT', 'DEEPAK', 'DIVYAB', 'RAHULS', 'SHOEHA',
                        'FAHEEM', 'SWATIT', 'ROHITD', 'SANTOS', 'ASHISH', 'PRAVEE', 'AMITS', 'NITINP', 'ARIFM',
                        'KANCHA', 'GEETAS', 'SURESH', 'IRFANM', 'MADHUR', 'MAHESH', 'PRIYAS', 'PANKAJ', 'POONAM',
                        'SAVITA', 'VINODS', 'BHAVNA', 'USHAK'
                    ];
                    const bankCodes = ['UBIN', 'PUNB', 'UTIB', 'KKBK', 'INDB', 'CBIN', 'IDIB', 'HDFC', 'CNRB', 'BARB',
                        'SBIN', 'ICIC', 'YESB', 'IDFB', 'BKID', 'AIRP'
                    ];

                    // Opening balance
                    transactions.push({
                        date: new Date(startDate),
                        desc: 'Opening Balance',
                        credit: openingBal,
                        debit: 0,
                        balance: openingBal,
                        ref: '—',
                        isOpening: true
                    });

                    for (let m = 0; m < period; m++) {
                        const date = new Date(startDate);
                        date.setMonth(date.getMonth() + m);
                        const month = date.getMonth();
                        const year = date.getFullYear();

                        // Salary
                        if (monthlyIncome > 0) {
                            const salDate = new Date(year, month, salaryDay);
                            if (salDate <= today) {
                                balance += monthlyIncome;
                                transactions.push({
                                    date: salDate,
                                    desc: `BY TRANSFER-SALARY/${employer}`,
                                    credit: monthlyIncome,
                                    debit: 0,
                                    balance: balance,
                                    ref: `SAL/${String(rand(1000, 9999))}`,
                                    isOpening: false
                                });
                            }
                        }

                        // Recurring expenses
                        recurring.forEach(exp => {
                            const expDate = new Date(year, month, exp.day);
                            if (expDate <= today) {
                                balance -= exp.amount;
                                transactions.push({
                                    date: expDate,
                                    desc: `TO TRANSFER-AUTO/${exp.name}`,
                                    credit: 0,
                                    debit: exp.amount,
                                    balance: balance,
                                    ref: `AUTO/${String(rand(1000, 9999))}`,
                                    isOpening: false
                                });
                            }
                        });

                        // Random daily UPI transactions
                        const daysInMonth = new Date(year, month + 1, 0).getDate();
                        for (let d = 1; d <= daysInMonth; d++) {
                            const curDate = new Date(year, month, d);
                            if (curDate <= new Date(startDate)) continue;
                            if (curDate > today) continue;

                            const isWeekend = (curDate.getDay() === 0 || curDate.getDay() === 6);
                            let prob = isWeekend ? 0.50 * spendMult : 0.25 * spendMult;
                            const isFestival = (d >= 10 && d <= 15) || (d >= 22 && d <= 28);
                            if (isFestival) prob *= 1.3;

                            if (Math.random() < prob) {
                                const amt = Math.round((rand(200, 5000) * spendMult) / 100) * 100;
                                const name1 = upiNames[rand(0, upiNames.length - 1)];
                                const bank1 = bankCodes[rand(0, bankCodes.length - 1)];
                                const refNum = String(rand(100000000000, 999999999999));
                                const isDebit = Math.random() < 0.6;

                                if (isDebit) {
                                    balance -= amt;
                                    transactions.push({
                                        date: curDate,
                                        desc: `TO TRANSFER-UPI/DR/${refNum}/${name1}/${bank1}/${String(rand(1000000000, 9999999999))}/Payme`,
                                        credit: 0,
                                        debit: amt,
                                        balance: balance,
                                        ref: refNum,
                                        isOpening: false
                                    });
                                } else {
                                    balance += amt;
                                    transactions.push({
                                        date: curDate,
                                        desc: `BY TRANSFER-UPI/CR/${refNum}/${name1}/${bank1}/${String(rand(1000000000, 9999999999))}/Payme`,
                                        credit: amt,
                                        debit: 0,
                                        balance: balance,
                                        ref: refNum,
                                        isOpening: false
                                    });
                                }
                            }
                        }
                    }

                    transactions.sort((a, b) => a.date - b.date);

                    // ─── Build HTML ───
                    const variantClass = pdfVariant === 'dark' ? 'dark' : '';
                    const bankCls = bank ? bank.cls : 'sbi';
                    const bankName = bank ? bank.name : 'Bank';
                    const bankShort = bank ? bank.short : 'SBI';

                    let rows = '';
                    let totalDebits = 0,
                        totalCredits = 0;

                    transactions.forEach((t) => {
                        const dateStr = t.date.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit',
                            year: 'numeric' });
                        const debitStr = t.debit > 0 ? t.debit.toLocaleString() : '—';
                        const creditStr = t.credit > 0 ? t.credit.toLocaleString() : '—';

                        // Format balance with comma and negative sign if applicable
                        let balStr = Math.round(t.balance).toLocaleString();
                        if (t.balance < 0) balStr = '-' + Math.abs(Math.round(t.balance)).toLocaleString();
                        const balClass = t.balance < 0 ? 'bal-neg' : '';

                        if (t.debit > 0) totalDebits += t.debit;
                        if (t.credit > 0) totalCredits += t.credit;

                        const rowStyle = t.isOpening ? 'font-weight:700;background:#f8f9fa;' : '';

                        rows += `
                            <tr style="${rowStyle}">
                                <td>${dateStr}</td>
                                <td>${dateStr}</td>
                                <td style="font-size:8px;">${t.desc}</td>
                                <td style="font-size:8px;">${t.ref || '—'}</td>
                                <td class="${t.debit > 0 ? 'debit' : ''}">${debitStr}</td>
                                <td class="${t.credit > 0 ? 'credit' : ''}">${creditStr}</td>
                                <td class="${balClass}">${balStr}</td>
                            </tr>
                        `;
                    });

                    // Closing balance
                    const closingBal = transactions.length > 0 ? Math.round(transactions[transactions.length - 1]
                        .balance) : openingBal;
                    let closingDisplay = closingBal.toLocaleString();
                    if (closingBal < 0) closingDisplay = '-' + Math.abs(closingBal).toLocaleString();
                    const closingClass = closingBal < 0 ? 'bal-neg' : '';

                    const periodStart = new Date(startDate);
                    const periodEnd = new Date(today);
                    const periodStr =
                        `${periodStart.toLocaleDateString('en-IN', {day:'2-digit',month:'2-digit',year:'numeric'})} to ${periodEnd.toLocaleDateString('en-IN', {day:'2-digit',month:'2-digit',year:'numeric'})}`;
                    const genDate = today.toLocaleDateString('en-IN', { day: '2-digit', month: '2-digit',
                        year: 'numeric' });
                    const accountOpenDate = new Date(startDate);
                    accountOpenDate.setFullYear(accountOpenDate.getFullYear() - 3);
                    const openDateStr = accountOpenDate.toLocaleDateString('en-IN', { day: '2-digit',
                        month: '2-digit', year: 'numeric' });

                    // Format opening balance with CR
                    let openingDisplay = openingBal.toLocaleString();

                    const html = `
                        <div class="statement-pdf ${variantClass}" id="statementPrint">
                            <!-- BANK HEADER -->
                            <div class="bank-header">
                                <div class="bank-name">
                                    <span class="${bankCls}-color">${bankName}</span>
                                </div>
                                <div class="sub">${bankShort} BANK · ${branch} · Branch Code: ${branchCode}</div>
                            </div>

                            <!-- ACCOUNT DETAILS -->
                            <div class="acc-details">
                                <span><span class="lbl">Account Holder:</span> ${name}</span>
                                <span><span class="lbl">Account No:</span> ${accNum}</span>
                                <span><span class="lbl">IFSC:</span> ${ifsc}</span>
                                <span><span class="lbl">Branch:</span> ${branch}</span>
                                <span><span class="lbl">MICR:</span> ${micr}</span>
                                <span><span class="lbl">CIF No:</span> ${cif}</span>
                                <span style="grid-column:1/-1;"><span class="lbl">Address:</span> ${address}</span>
                            </div>

                            <!-- TABLE -->
                            <table>
                                <thead>
                                    <tr>
                                        <th>Value Date</th>
                                        <th>Post Date</th>
                                        <th>Details</th>
                                        <th>Ref No/Cheque No</th>
                                        <th>Debit</th>
                                        <th>Credit</th>
                                        <th>Balance</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rows}
                                    <tr style="font-weight:700;border-top:2px solid #1c1c1c;background:#f8f9fa;">
                                        <td colspan="4" style="text-align:right;">TOTAL</td>
                                        <td class="debit">${Math.round(totalDebits).toLocaleString()}</td>
                                        <td class="credit">${Math.round(totalCredits).toLocaleString()}</td>
                                        <td class="${closingClass}">${closingDisplay}</td>
                                    </tr>
                                </tbody>
                            </table>

                            <!-- SUMMARY -->
                            <div class="summary-box">
                                <span><strong>Opening Balance:</strong> ${openingDisplay}</span>
                                <span><strong>Total Debits:</strong> ${Math.round(totalDebits).toLocaleString()}</span>
                                <span><strong>Total Credits:</strong> ${Math.round(totalCredits).toLocaleString()}</span>
                                <span><strong>Closing Balance:</strong> ${closingDisplay}</span>
                            </div>

                            <!-- FOOTER -->
                            <div class="footer">
                                <strong>${bankName}</strong> · ${branch} · ${ifsc}<br />
                                Please do not share your ATM, Debit/Credit Card number, PIN (Personal Identification number),
                                OTP (One-Time Password), Username or Password with anyone via email, SMS, phone call, or any other medium.
                                Bank never asks for such information. If your account is operated by a Power of Attorney holder,
                                please review the transactions with extra care. This is a computer generated statement and does not require a signature.
                            </div>
                        </div>
                    `;

                    document.getElementById('statementContent').innerHTML = html;
                    currentHTML = html;
                    document.getElementById('output').classList.add('show');
                    statementCount++;

                    btn.disabled = false;
                    btn.textContent = '⚡ Generate Statement';
                    showToast('✅ Statement generated!', 'success');

                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = '⚡ Generate Statement';
                    showToast('❌ Error: ' + err.message, 'error');
                    console.error(err);
                }
            }, 600);
        }

        // ─── PDF DOWNLOAD ───
        function downloadPDF() {
            const element = document.getElementById('statementPrint');
            if (!element) { showToast('❌ Generate first', 'error'); return; }
            const orientation = document.querySelector('#pdfOrientation .active')?.dataset.value || 'portrait';
            const bankKey = 'sbi';
            document.querySelectorAll('.bank-btn').forEach(b => { if (b.style.borderColor === '#1a5276') { var k = b
                        .dataset.bank; } });
            const bank = banks[bankKey] || banks.sbi;
            const fileName =
                `${bank ? bank.short : 'Bank'}_Statement_${new Date().toISOString().slice(0,10)}.pdf`;

            const opt = {
                margin: [0.4, 0.4, 0.4, 0.4],
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: orientation },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            };

            const clone = element.cloneNode(true);
            clone.style.width = '100%';
            clone.style.maxWidth = '100%';
            clone.style.margin = '0 auto';

            const container = document.createElement('div');
            container.style.cssText = 'background:#fff;padding:0;max-width:1000px;margin:0 auto;';
            container.appendChild(clone);
            document.body.appendChild(container);

            html2pdf().set(opt).from(container).save().then(() => {
                document.body.removeChild(container);
                showToast('📥 Downloaded!', 'success');
            }).catch(() => {
                document.body.removeChild(container);
                showToast('❌ Error', 'error');
            });
        }

        // ─── COPY ───
        function copyStatement() {
            const element = document.getElementById('statementPrint');
            if (!element) { showToast('❌ Generate first', 'error'); return; }
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => { showToast('📋 Copied!', 'success'); }).catch(() => {
                const range = document.createRange();
                range.selectNode(element);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                showToast('📋 Copied!', 'success');
            });
        }

        console.log('🚀 Pro Statement loaded - PDF Replica ready!');
    </script>

</body>
